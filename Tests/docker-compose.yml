services:
  pwsh-tests:
    build:
      # The working directory is the parent directory of Tests/ (or repository root)
      context: ..
      dockerfile: Tests/Dockerfile
    container_name: pwsh-profile-tests
    volumes:
      - ..:/workspace
    working_dir: /workspace
    entrypoint:
      - pwsh
      - -NoProfile
      - -File
      - ./Tests/Invoke-DockerTests.ps1
    command: []
