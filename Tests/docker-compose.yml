services:
  pwsh-tests:
    # The current PowerShell LTS Alpine base image is amd64-only, so make the
    # emulated platform explicit on Apple Silicon hosts.
    platform: linux/amd64
    build:
      # The working directory is the parent directory of Tests/ (or repository root)
      context: ..
      dockerfile: Tests/Dockerfile
    container_name: pwsh-profile-tests
    volumes:
      - ..:/workspace
    working_dir: /workspace
    entrypoint:
      - pwsh
      - -NoProfile
      - -File
      - ./Tests/Invoke-DockerTests.ps1
    command: []
