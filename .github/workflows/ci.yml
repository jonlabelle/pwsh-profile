name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".vscode/**"
      - "resources/**"
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths-ignore:
      - "**.md"
      - ".vscode/**"
      - "resources/**"
  workflow_dispatch:
    inputs:
      powershell-core:
        description: "PowerShell Core"
        required: false
        default: true
        type: boolean
      powershell-desktop:
        description: "PowerShell Desktop"
        required: false
        default: true
        type: boolean
      powershell-desktop-test-type:
        description: "PowerShell Desktop test scope"
        required: false
        default: Unit
        type: choice
        options:
          - Unit
          - Integration
          - All

# Cancel any in-progress runs when a new commit is pushed
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  psscriptanalyzer-sarif:
    name: Publish PSScriptAnalyzer results
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@main

      - name: Run PSScriptAnalyzer and generate SARIF
        uses: microsoft/psscriptanalyzer-action@main
        with:
          path: .
          recurse: true
          settings: PSScriptAnalyzerSettings.psd1
          output: results.sarif

      - name: Upload PSScriptAnalyzer results
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/upload-sarif@main
        with:
          sarif_file: results.sarif
          category: /tool:PSScriptAnalyzer

  powershell-core:
    name: Build on ${{ matrix.platform }} (pwsh)
    if: github.event_name != 'workflow_dispatch' || inputs.powershell-core
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@main

      - name: Get PowerShell module path
        id: psmodpath
        shell: pwsh
        run: |
          $modulePath = if ($IsWindows) {
            Join-Path -Path ([System.Environment]::GetFolderPath('MyDocuments')) -ChildPath 'PowerShell\Modules'
          } else {
            Join-Path -Path $HOME -ChildPath '.local/share/powershell/Modules'
          }
          "path=$modulePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Cache PowerShell modules
        uses: actions/cache@main
        id: cache-psmodules
        with:
          path: ${{ steps.psmodpath.outputs.path }}
          key: psmodules-pwsh-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            psmodules-pwsh-${{ runner.os }}-

      - name: Install PSScriptAnalyzer module
        if: steps.cache-psmodules.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -ErrorAction Stop

      - name: Install Pester module
        if: steps.cache-psmodules.outputs.cache-hit != 'true'
        shell: pwsh
        run: Install-Module Pester -Force -SkipPublisherCheck -ErrorAction Stop

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Invoke-ScriptAnalyzer -Settings PSScriptAnalyzerSettings.psd1 -Path . -Recurse -OutVariable issues
          $errors = $issues.Where({$_.Severity -eq 'Error'})
          $warnings = $issues.Where({$_.Severity -eq 'Warning'})
          if ($errors) {
              Write-Error "There were $($errors.Count) errors and $($warnings.Count) warnings total." -ErrorAction Stop
          }
          else {
              Write-Output "There were $($errors.Count) errors and $($warnings.Count) warnings total."
          }

      - name: Run Pester tests
        shell: pwsh
        run: |
          ./Invoke-Tests.ps1 -TestType All -OutputFormat Normal
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Tests failed with exit code $LASTEXITCODE" -ErrorAction Stop
          }

      - name: Summarize test timings
        shell: pwsh
        if: always()
        run: ./Tests/Write-TestTimingSummary.ps1 -Path testresults.xml -Title "Pester timings (${{ matrix.platform }} / pwsh)"

      - name: Upload test results
        uses: actions/upload-artifact@main
        if: always()
        with:
          name: test-results-${{ matrix.platform }}-core
          path: testresults.xml

  powershell-desktop:
    name: Build on windows-latest (powershell)
    if: github.event_name != 'workflow_dispatch' || inputs.powershell-desktop
    runs-on: windows-latest

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@main

      - name: Get PowerShell module path
        id: psmodpath
        shell: powershell
        run: |
          $modulePath = Join-Path -Path ([System.Environment]::GetFolderPath('MyDocuments')) -ChildPath 'WindowsPowerShell\Modules'
          "path=$modulePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Cache PowerShell modules
        uses: actions/cache@main
        id: cache-psmodules
        with:
          path: ${{ steps.psmodpath.outputs.path }}
          key: psmodules-desktop-windows-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            psmodules-desktop-windows-

      - name: Install PSScriptAnalyzer module
        if: steps.cache-psmodules.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -ErrorAction Stop

      - name: Install Pester module
        if: steps.cache-psmodules.outputs.cache-hit != 'true'
        shell: powershell
        run: Install-Module Pester -Force -SkipPublisherCheck -ErrorAction Stop

      - name: Run PSScriptAnalyzer
        shell: powershell
        run: |
          Invoke-ScriptAnalyzer -Settings PSScriptAnalyzerSettings.psd1 -Path . -Recurse -OutVariable issues
          $errors = $issues.Where({$_.Severity -eq 'Error'})
          $warnings = $issues.Where({$_.Severity -eq 'Warning'})
          if ($errors) {
              Write-Error "There were $($errors.Count) errors and $($warnings.Count) warnings total." -ErrorAction Stop
          }
          else {
              Write-Output "There were $($errors.Count) errors and $($warnings.Count) warnings total."
          }

      - name: Run Pester tests
        shell: powershell
        run: |
          $testType = "${{ github.event_name == 'workflow_dispatch' && inputs['powershell-desktop-test-type'] || 'Unit' }}"
          .\Invoke-Tests.ps1 -TestType $testType -OutputFormat Normal
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Tests failed with exit code $LASTEXITCODE" -ErrorAction Stop
          }

      - name: Summarize test timings
        shell: powershell
        if: always()
        run: .\Tests\Write-TestTimingSummary.ps1 -Path testresults.xml -Title "Pester timings (windows-latest / powershell)"

      - name: Upload test results
        uses: actions/upload-artifact@main
        if: always()
        with:
          name: test-results-windows-latest-desktop
          path: testresults.xml
